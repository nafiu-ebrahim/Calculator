<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TI-30XS MultiView GED Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#06080f;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
overflow-x:hidden;
}

.bg-glow{
position:fixed;
width:500px;
height:500px;
background:rgba(59,130,246,0.18);
filter:blur(120px);
border-radius:50%;
left:-150px;
top:-150px;
}

.bg-glow2{
position:fixed;
width:450px;
height:450px;
background:rgba(168,85,247,0.18);
filter:blur(120px);
border-radius:50%;
right:-120px;
bottom:-120px;
}

.phone-wrapper{
width:100%;
max-width:430px;
position:relative;
z-index:10;
}

.made-by{
text-align:center;
margin-bottom:14px;
color:white;
font-size:13px;
font-weight:800;
letter-spacing:4px;
padding:12px 20px;
border-radius:999px;
background:linear-gradient(90deg,#2563eb,#7c3aed);
box-shadow:0 10px 30px rgba(59,130,246,0.35);
}

.calculator-shell{
background:#4b555e;
border-radius:34px;
padding:18px;
box-shadow:0 25px 80px rgba(0,0,0,0.6);
border:3px solid #69727b;
}

.top-brand{
display:flex;
justify-content:flex-end;
padding:10px 10px 14px;
}

.brand-text{
text-align:right;
color:white;
}

.brand-text h1{
font-size:48px;
font-weight:800;
line-height:0.9;
}

.brand-text h2{
font-size:20px;
font-style:italic;
font-weight:400;
letter-spacing:4px;
}

.screen{
background:#ececec;
height:170px;
border-radius:2px;
padding:20px;
margin-bottom:18px;
position:relative;
overflow:hidden;
box-shadow:inset 0 0 10px rgba(0,0,0,0.2);
}

.rad{
position:absolute;
right:15px;
top:10px;
font-size:18px;
font-weight:700;
color:#111;
}

.display-text{
font-size:42px;
font-weight:500;
color:#111;
margin-top:40px;
word-break:break-all;
font-family:monospace;
}

.result{
position:absolute;
bottom:18px;
right:18px;
font-size:26px;
font-weight:700;
color:#111;
font-family:monospace;
}

.keypad{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.btn{
height:72px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:700;
position:relative;
cursor:pointer;
transition:0.18s ease;
overflow:hidden;
}

.btn:active{
transform:scale(0.94);
}

.dark-btn{
background:#2f3641;
color:white;
border:3px solid #5f6872;
}

.white-btn{
background:#ececec;
color:#333;
border:3px solid #d5d5d5;
}

.green-btn{
background:#a6c56a;
color:#2f3641;
border:3px solid #c8e48d;
}

.operator-btn{
background:#2d3340;
color:white;
border:3px solid #59616d;
}

.top-label{
position:absolute;
top:6px;
left:0;
right:0;
font-size:12px;
font-weight:800;
color:#d9f57b;
}

.main-label{
position:absolute;
bottom:12px;
left:0;
right:0;
font-size:17px;
}

.enter-btn{
grid-column:span 1;
height:72px;
}

.arrow-pad{
grid-column:span 2;
height:72px;
border-radius:40px;
background:#2f3641;
border:3px solid #5f6872;
display:flex;
align-items:center;
justify-content:center;
gap:22px;
color:white;
font-size:26px;
}

.footer-note{
text-align:center;
margin-top:18px;
color:#94a3b8;
font-size:13px;
line-height:1.6;
}

@media(max-width:480px){
body{
padding:10px;
}

.calculator-shell{
padding:12px;
border-radius:26px;
}

.brand-text h1{
font-size:38px;
}

.brand-text h2{
font-size:16px;
}

.screen{
height:145px;
}

.display-text{
font-size:28px;
margin-top:35px;
}

.result{
font-size:20px;
}

.btn{
height:62px;
}

.main-label{
font-size:14px;
}

.top-label{
font-size:10px;
}
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<div class="phone-wrapper">

<div class="made-by">
MADE BY NAFIU
</div>

<div class="calculator-shell">

<div class="top-brand">
<div class="brand-text">
<h1>TI-30XS</h1>
<h2>MultiView</h2>
</div>
</div>

<div class="screen">
<div class="rad">RAD</div>
<div class="display-text" id="display">MEMORY CLEARED</div>
<div class="result" id="result">0</div>
</div>

<div class="keypad">

<button class="btn green-btn" onclick="appendValue('2nd')">
<div class="main-label">2nd</div>
</button>

<button class="btn dark-btn" onclick="appendValue('mode')">
<div class="top-label">quit</div>
<div class="main-label">mode</div>
</button>

<button class="btn dark-btn" onclick="appendValue('delete')">
<div class="top-label">insert</div>
<div class="main-label">delete</div>
</button>

<div class="arrow-pad">
◀ ▲ ▼ ▶
</div>

<button class="btn dark-btn" onclick="appendValue('Math.log10(')">
<div class="top-label">10ˣ</div>
<div class="main-label">log</div>
</button>

<button class="btn dark-btn" onclick="appendValue('angle')">
<div class="top-label">angle</div>
<div class="main-label">prb</div>
</button>

<button class="btn dark-btn" onclick="appendValue('data')">
<div class="top-label">stat</div>
<div class="main-label">data</div>
</button>

<button class="btn dark-btn" onclick="appendValue('table')">
<div class="top-label">f↔d</div>
<div class="main-label">table</div>
</button>

<button class="btn dark-btn" onclick="clearDisplay()">
<div class="main-label">clear</div>
</button>

<button class="btn dark-btn" onclick="appendValue('Math.PI')">
<div class="top-label">hyp</div>
<div class="main-label">π</div>
</button>

<button class="btn dark-btn" onclick="appendValue('Math.sin(')">
<div class="top-label">sin⁻¹</div>
<div class="main-label">sin</div>
</button>

<button class="btn dark-btn" onclick="appendValue('Math.cos(')">
<div class="top-label">cos⁻¹</div>
<div class="main-label">cos</div>
</button>

<button class="btn dark-btn" onclick="appendValue('Math.tan(')">
<div class="top-label">tan⁻¹</div>
<div class="main-label">tan</div>
</button>

<button class="btn operator-btn" onclick="appendValue('/')">
<div class="top-label">k</div>
<div class="main-label">÷</div>
</button>

<button class="btn dark-btn" onclick="appendValue('**')">
<div class="top-label">xʸ</div>
<div class="main-label">^</div>
</button>

<button class="btn dark-btn" onclick="appendValue('1/')">
<div class="main-label">x⁻¹</div>
</button>

<button class="btn dark-btn" onclick="appendValue('(')">
<div class="top-label">%</div>
<div class="main-label">(</div>
</button>

<button class="btn dark-btn" onclick="appendValue(')')">
<div class="top-label">▶%</div>
<div class="main-label">)</div>
</button>

<button class="btn operator-btn" onclick="appendValue('*')">
<div class="main-label">×</div>
</button>

<button class="btn dark-btn" onclick="appendValue('Math.sqrt(')">
<div class="top-label">√</div>
<div class="main-label">x²</div>
</button>

<button class="btn white-btn" onclick="appendValue('7')">
<div class="main-label">7</div>
</button>

<button class="btn white-btn" onclick="appendValue('8')">
<div class="main-label">8</div>
</button>

<button class="btn white-btn" onclick="appendValue('9')">
<div class="main-label">9</div>
</button>

<button class="btn operator-btn" onclick="appendValue('-')">
<div class="main-label">−</div>
</button>

<button class="btn dark-btn" onclick="clearDisplay()">
<div class="top-label">clear var</div>
<div class="main-label">x</div>
</button>

<button class="btn white-btn" onclick="appendValue('4')">
<div class="main-label">4</div>
</button>

<button class="btn white-btn" onclick="appendValue('5')">
<div class="main-label">5</div>
</button>

<button class="btn white-btn" onclick="appendValue('6')">
<div class="main-label">6</div>
</button>

<button class="btn operator-btn" onclick="appendValue('+')">
<div class="main-label">+</div>
</button>

<button class="btn dark-btn" onclick="appendValue('sto')">
<div class="top-label">recall</div>
<div class="main-label">sto→</div>
</button>

<button class="btn white-btn" onclick="appendValue('1')">
<div class="main-label">1</div>
</button>

<button class="btn white-btn" onclick="appendValue('2')">
<div class="main-label">2</div>
</button>

<button class="btn white-btn" onclick="appendValue('3')">
<div class="main-label">3</div>
</button>

<button class="btn white-btn" onclick="backspace()">
<div class="main-label">◀▶</div>
</button>

<button class="btn dark-btn" onclick="powerToggle()">
<div class="top-label">off</div>
<div class="main-label">on</div>
</button>

<button class="btn white-btn" onclick="appendValue('0')">
<div class="top-label">reset</div>
<div class="main-label">0</div>
</button>

<button class="btn white-btn" onclick="appendValue('.')">
<div class="main-label">.</div>
</button>

<button class="btn white-btn" onclick="appendValue('-')">
<div class="top-label">ans</div>
<div class="main-label">(-)</div>
</button>

<button class="btn white-btn enter-btn" onclick="calculateResult()">
<div class="main-label">enter</div>
</button>

</div>

<div class="footer-note">
TI‑30XS MultiView GED Scientific Calculator • Fully Mobile Responsive • Modern UI Clone
</div>

</div>

</div>

<script>

let expression='';
let powered=true;

const display=document.getElementById('display');
const result=document.getElementById('result');

function appendValue(value){
if(!powered)return;

if(display.innerText==='MEMORY CLEARED'){
display.innerText='';
}

expression+=value;
display.innerText=expression || '0';
}

function clearDisplay(){
if(!powered)return;
expression='';
display.innerText='0';
result.innerText='0';
}

function backspace(){
if(!powered)return;
expression=expression.slice(0,-1);
display.innerText=expression || '0';
}

function calculateResult(){
if(!powered)return;

try{
const calc=eval(expression);
result.innerText=calc;
}
catch{
result.innerText='ERROR';
}
}

function powerToggle(){
powered=!powered;

if(powered){
display.innerText='READY';
result.innerText='0';
}
else{
display.innerText='';
result.innerText='';
}
}

document.addEventListener('keydown',e=>{
if(!powered)return;

if(!isNaN(e.key)||['+','-','*','/','.','(',')'].includes(e.key)){
appendValue(e.key);
}

if(e.key==='Enter'){
calculateResult();
}

if(e.key==='Backspace'){
backspace();
}
});

setTimeout(()=>{
display.innerText='READY';
},2500);

</script>

</body>
</html>
