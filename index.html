<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TI-30XS MultiView GED Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
font-family:'Inter',sans-serif;
}

body{
background:#0a0d14;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:12px;
overflow-x:hidden;
}

.phone-wrapper{
width:100%;
max-width:420px;
}

.made-by{
text-align:center;
margin-bottom:12px;
padding:12px;
background:linear-gradient(90deg,#2563eb,#7c3aed);
color:white;
font-size:13px;
font-weight:800;
letter-spacing:4px;
border-radius:999px;
}

.calculator-shell{
background:#4d5862;
padding:14px;
border-radius:32px;
border:2px solid #6d7883;
box-shadow:0 25px 60px rgba(0,0,0,.6);
}

.top-brand{
display:flex;
justify-content:flex-end;
padding:6px 6px 14px;
}

.brand-text{
text-align:right;
color:white;
}

.brand-text h1{
font-size:44px;
font-weight:800;
line-height:1;
}

.brand-text h2{
font-size:18px;
font-style:italic;
font-weight:400;
letter-spacing:3px;
}

.screen{
background:#efefef;
height:155px;
border-radius:4px;
padding:16px;
position:relative;
margin-bottom:14px;
overflow:hidden;
}

.rad{
position:absolute;
right:14px;
top:10px;
font-size:14px;
font-weight:700;
font-family:monospace;
}

.display-text{
font-size:28px;
font-family:monospace;
margin-top:34px;
color:#111;
word-break:break-all;
}

.result{
position:absolute;
right:14px;
bottom:12px;
font-size:24px;
font-family:monospace;
font-weight:700;
color:#111;
}

.keypad{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
}

.btn{
height:68px;
border:none;
border-radius:14px;
position:relative;
font-weight:700;
transition:transform .06s ease;
cursor:pointer;
user-select:none;
}

.btn:active{
transform:scale(.94);
}

.dark-btn{
background:#313945;
border:2px solid #6d7580;
color:white;
}

.white-btn{
background:#ececec;
border:2px solid #d7d7d7;
color:#333;
}

.green-btn{
background:#a8c96a;
border:2px solid #cce493;
color:#2e3640;
}

.operator-btn{
background:#2b313c;
border:2px solid #656d79;
color:white;
}

.top-label{
position:absolute;
top:7px;
left:0;
right:0;
font-size:11px;
color:#dff17c;
font-weight:800;
}

.main-label{
position:absolute;
left:0;
right:0;
bottom:11px;
font-size:17px;
}

.arrow-pad{
grid-column:span 2;
height:68px;
border-radius:40px;
background:#2f3641;
border:2px solid #6d7580;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:24px;
letter-spacing:6px;
}

.footer-note{
margin-top:14px;
text-align:center;
font-size:12px;
color:#cbd5e1;
}

@media(max-width:480px){
.brand-text h1{
font-size:34px;
}

.brand-text h2{
font-size:15px;
}

.btn{
height:60px;
border-radius:12px;
}

.main-label{
font-size:14px;
}

.top-label{
font-size:9px;
}

.arrow-pad{
height:60px;
font-size:20px;
}

.display-text{
font-size:22px;
}

.result{
font-size:20px;
}
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<div class="phone-wrapper">

<div class="made-by">
MADE BY NAFIU
</div>

<div class="calculator-shell">

<div class="top-brand">
<div class="brand-text">
<h1>TI-30XS</h1>
<h2>MultiView</h2>
</div>
</div>

<div class="screen">
<div class="rad">RAD</div>
<div class="display-text" id="display">MEMORY CLEARED</div>
<div class="result" id="result">0</div>
</div>

<div class="keypad">

<button class="btn green-btn" onclick="appendValue('2nd')">
<div class="main-label">2nd</div>
</button>

<button class="btn dark-btn" onclick="appendValue('mode')">
<div class="top-label">quit</div>
<div class="main-label">mode</div>
</button>

<button class="btn dark-btn" onclick="appendValue('delete')">
<div class="top-label">insert</div>
<div class="main-label">delete</div>
</button>

<div class="arrow-pad">
◀ ▲ ▼ ▶
</div>

<button class="btn dark-btn" onclick="appendValue('log(')">
<div class="top-label">10ˣ</div>
<div class="main-label">log</div>
</button>

<button class="btn dark-btn" onclick="toggleAngle()">
<div class="top-label">angle</div>
<div class="main-label">prb</div>
</button>

<button class="btn dark-btn" onclick="appendValue('data')">
<div class="top-label">stat</div>
<div class="main-label">data</div>
</button>

<button class="btn dark-btn" onclick="appendValue('table')">
<div class="top-label">f↔d</div>
<div class="main-label">table</div>
</button>

<button class="btn dark-btn" onclick="clearDisplay()">
<div class="main-label">clear</div>
</button>

<button class="btn dark-btn" onclick="appendValue('π')">
<div class="top-label">hyp</div>
<div class="main-label">π</div>
</button>

<button class="btn dark-btn" onclick="appendValue('sin(')">
<div class="top-label">sin⁻¹</div>
<div class="main-label">sin</div>
</button>

<button class="btn dark-btn" onclick="appendValue('cos(')">
<div class="top-label">cos⁻¹</div>
<div class="main-label">cos</div>
</button>

<button class="btn dark-btn" onclick="appendValue('tan(')">
<div class="top-label">tan⁻¹</div>
<div class="main-label">tan</div>
</button>

<button class="btn operator-btn" onclick="appendValue('/')">
<div class="top-label">k</div>
<div class="main-label">÷</div>
</button>

<button class="btn dark-btn" onclick="appendValue('**')">
<div class="top-label">xʸ</div>
<div class="main-label">^</div>
</button>

<button class="btn dark-btn" onclick="appendValue('1/')">
<div class="main-label">x⁻¹</div>
</button>

<button class="btn dark-btn" onclick="appendValue('(')">
<div class="top-label">%</div>
<div class="main-label">(</div>
</button>

<button class="btn dark-btn" onclick="appendValue(')')">
<div class="top-label">▶%</div>
<div class="main-label">)</div>
</button>

<button class="btn operator-btn" onclick="appendValue('*')">
<div class="main-label">×</div>
</button>

<button class="btn dark-btn" onclick="appendValue('sqrt(')">
<div class="top-label">√</div>
<div class="main-label">x²</div>
</button>

<button class="btn white-btn" onclick="appendValue('7')">
<div class="main-label">7</div>
</button>

<button class="btn white-btn" onclick="appendValue('8')">
<div class="main-label">8</div>
</button>

<button class="btn white-btn" onclick="appendValue('9')">
<div class="main-label">9</div>
</button>

<button class="btn operator-btn" onclick="appendValue('-')">
<div class="main-label">−</div>
</button>

<button class="btn dark-btn" onclick="clearDisplay()">
<div class="top-label">clear var</div>
<div class="main-label">x</div>
</button>

<button class="btn white-btn" onclick="appendValue('4')">
<div class="main-label">4</div>
</button>

<button class="btn white-btn" onclick="appendValue('5')">
<div class="main-label">5</div>
</button>

<button class="btn white-btn" onclick="appendValue('6')">
<div class="main-label">6</div>
</button>

<button class="btn operator-btn" onclick="appendValue('+')">
<div class="main-label">+</div>
</button>

<button class="btn dark-btn" onclick="appendValue('sto')">
<div class="top-label">recall</div>
<div class="main-label">sto→</div>
</button>

<button class="btn white-btn" onclick="appendValue('1')">
<div class="main-label">1</div>
</button>

<button class="btn white-btn" onclick="appendValue('2')">
<div class="main-label">2</div>
</button>

<button class="btn white-btn" onclick="appendValue('3')">
<div class="main-label">3</div>
</button>

<button class="btn white-btn" onclick="backspace()">
<div class="main-label">◀▶</div>
</button>

<button class="btn dark-btn" onclick="powerToggle()">
<div class="top-label">off</div>
<div class="main-label">on</div>
</button>

<button class="btn white-btn" onclick="appendValue('0')">
<div class="top-label">reset</div>
<div class="main-label">0</div>
</button>

<button class="btn white-btn" onclick="appendValue('.')">
<div class="main-label">.</div>
</button>

<button class="btn white-btn" onclick="appendValue('-')">
<div class="top-label">ans</div>
<div class="main-label">(-)</div>
</button>

<button class="btn white-btn enter-btn" onclick="calculateResult()">
<div class="main-label">enter</div>
</button>

</div>

<div class="footer-note">
TI‑30XS MultiView GED Scientific Calculator • Fully Mobile Responsive • Modern UI Clone
</div>

</div>

</div>

<script>
let expression='';
let powered=true;
let angleMode='RAD';

const display=document.getElementById('display');
const result=document.getElementById('result');
const rad=document.querySelector('.rad');

function render(){
display.textContent=expression || '0';
}

function appendValue(value){
if(!powered)return;

if(display.textContent==='MEMORY CLEARED'||display.textContent==='READY'){
expression='';
}

expression+=value;
render();
}

function clearDisplay(){
if(!powered)return;
expression='';
render();
result.textContent='0';
}

function backspace(){
if(!powered)return;
expression=expression.slice(0,-1);
render();
}

function toggleAngle(){
if(!powered)return;
angleMode=angleMode==='RAD'?'DEG':'RAD';
rad.textContent=angleMode;
}

function formatExpression(exp){
exp=exp.replace(/÷/g,'/');
exp=exp.replace(/×/g,'*');
exp=exp.replace(/π/g,'Math.PI');
exp=exp.replace(/sqrt\(/g,'Math.sqrt(');
exp=exp.replace(/log\(/g,'Math.log10(');

if(angleMode==='DEG'){
exp=exp.replace(/sin\(([^()]*)\)/g,'Math.sin(($1)*Math.PI/180)');
exp=exp.replace(/cos\(([^()]*)\)/g,'Math.cos(($1)*Math.PI/180)');
exp=exp.replace(/tan\(([^()]*)\)/g,'Math.tan(($1)*Math.PI/180)');
}else{
exp=exp.replace(/sin\(([^()]*)\)/g,'Math.sin($1)');
exp=exp.replace(/cos\(([^()]*)\)/g,'Math.cos($1)');
exp=exp.replace(/tan\(([^()]*)\)/g,'Math.tan($1)');
}

return exp;
}

function calculateResult(){
if(!powered)return;

try{
const formatted=formatExpression(expression);
const answer=eval(formatted);

if(isNaN(answer)||!isFinite(answer)){
result.textContent='ERROR';
return;
}

result.textContent=parseFloat(answer.toFixed(10));
}
catch(error){
result.textContent='ERROR';
}
}

function powerToggle(){
powered=!powered;

if(powered){
display.textContent='READY';
result.textContent='0';
}else{
display.textContent='';
result.textContent='';
}
}

document.addEventListener('keydown',e=>{
if(!powered)return;

if(/[0-9+\-*/().]/.test(e.key)){
expression+=e.key;
render();
}

if(e.key==='Enter') calculateResult();
if(e.key==='Backspace') backspace();
if(e.key==='Escape') clearDisplay();
});

const buttons=document.querySelectorAll('.btn');

buttons.forEach(btn=>{
btn.addEventListener('touchstart',()=>{
btn.style.transform='scale(.93)';
},{passive:true});

btn.addEventListener('touchend',()=>{
btn.style.transform='scale(1)';
},{passive:true});
});

setTimeout(()=>{
display.textContent='READY';
},1000);
</script>

</body>
</html>
